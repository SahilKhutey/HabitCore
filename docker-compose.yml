version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Internal and External listeners
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  flink-jobmanager:
    image: flink:1.17
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8082:8081"
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager

  flink-taskmanager:
    image: flink:1.17
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    scale: 1
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager

  # Custom container to submit the Python Flink job
  flink-job-submitter:
    build: ./streaming/flink
    container_name: flink-job-submitter
    depends_on:
      - kafka
      - flink-jobmanager
    volumes:
      - ./streaming/flink/jobs:/jobs
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    command: >
      bash -c "
      echo 'Waiting for Kafka and Flink...' &&
      sleep 20 &&
      flink run -py /jobs/flink_job.py
      "

  # Nudge Engine for real-time behavioral intervention
  nudge-engine:
    build:
      context: .
      dockerfile: ./nudge_engine/Dockerfile
    container_name: nudge-engine
    depends_on:
      - kafka
      - postgres # Assuming postgres is added or using sqlite volume
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/habitcore
    volumes:
      - ./backend:/backend
      - ./nudge_engine:/nudge_engine

  # Real-Time Decision Engine + Feature Store
  realtime-engine:
    build: ./realtime_engine
    container_name: realtime-engine
    depends_on:
      - redis
    ports:
      - "8004:8000"
    environment:
      - REDIS_HOST=redis

networks:
  default:
    name: habitcore-realtime-net

volumes:
  redis-data:
